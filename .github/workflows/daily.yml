name Build OverseasPost EPUB

on
  workflow_dispatch
  schedule
    # 北京时间 0810 = UTC 0010
    - cron 10 0   

jobs
  build
    runs-on ubuntu-latest

    steps
      - name Checkout repository
        uses actionscheckout@v4

      - name Set up Python
        uses actionssetup-python@v5
        with
          python-version 3.11

      - name Install dependencies
        run 
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name Run crawler
        env
          TARGET_DATE 
          TOP_N 50
          RETRY_TIMES 4
          RETRY_SLEEP 2
        run 
          python overseaspost_daily.py

      - name Upload EPUB artifact
        uses actionsupload-artifact@v4
        with
          name overseaspost-epub
          path output.epub
