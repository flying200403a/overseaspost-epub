name: Build OverseasPost EPUB

on:
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler
        env:
          TARGET_DATE: ""
          TOP_N: "50"
          RETRY_TIMES: "4"
          RETRY_SLEEP: "2"
        run: |
          python overseaspost_daily.py

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: overseaspost-epub
          path: output/*.epub
